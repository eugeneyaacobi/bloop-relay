relay_url: ws://bloop-relay:8080/connect
auth_token: dev-token
control_plane_url: http://host.docker.internal:38081
enrollment_token: __REPLACE_AT_RUNTIME__
reconnect:
  initial_delay_ms: 1000
  max_delay_ms: 5000
logging:
  level: debug
  format: json
tunnels:
  - name: app
    hostname: app.bloop.to
    local_addr: echo-server:19090
    access: public
