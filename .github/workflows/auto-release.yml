name: bloop-relay-auto-release

on:
  workflow_run:
    workflows: ["bloop-tunnel-ci"]
    types: [completed]

permissions:
  contents: write
  packages: write

jobs:
  auto-release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine next patch version
        id: version
        shell: bash
        run: |
          git fetch --tags --force
          latest_tag=$(git tag -l 'v*' --sort=-version:refname | head -n1)
          if [ -z "$latest_tag" ]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            major=${major:-0}
            minor=${minor:-1}
            patch=${patch:-0}
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.next_tag }}"
          git push origin "${{ steps.version.outputs.next_tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          generate_release_notes: true
          name: bloop-relay ${{ steps.version.outputs.next_tag }}
