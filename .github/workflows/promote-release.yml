name: bloop-relay-promote-release

on:
  workflow_run:
    workflows: ["bloop-tunnel-ci"]
    types: [completed]

permissions:
  contents: write
  packages: write

jobs:
  promote-release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Determine next stable version
        id: version
        shell: bash
        run: |
          git fetch --tags --force
          latest_stable=$(git tag -l 'v*' --sort=-version:refname | grep -Ev -- '-rc\.' | head -n1)
          if [ -z "$latest_stable" ]; then
            next_tag="v0.1.0"
          else
            version="${latest_stable#v}"
            IFS='.' read -r major minor patch <<< "$version"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
      - name: Create stable tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          name: bloop-relay ${{ steps.version.outputs.tag }}
