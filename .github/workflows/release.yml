name: bloop-tunnel-release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-release-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build release binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags="-s -w" -o "dist/bloop-relay-${GOOS}-${GOARCH}${EXT}" ./cmd/bloop-relay
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve Docker Hub namespace
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          USERNAME="$DOCKERHUB_USERNAME"
          if [ -z "$USERNAME" ]; then USERNAME="$REPO_OWNER"; fi
          echo "username=${USERNAME,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push bloop-relay image to GHCR and Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/client.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/bloop-relay:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.value }}/bloop-relay:latest
            docker.io/${{ steps.dockerhub.outputs.username }}/bloop-relay:${{ github.ref_name }}
            docker.io/${{ steps.dockerhub.outputs.username }}/bloop-relay:latest

  update-dockerhub-description:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Docker Hub namespace
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          USERNAME="$DOCKERHUB_USERNAME"
          if [ -z "$USERNAME" ]; then USERNAME="$REPO_OWNER"; fi
          echo "username=${USERNAME,,}" >> "$GITHUB_OUTPUT"
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ steps.dockerhub.outputs.username }}/bloop-relay
          short-description: ${{ github.event.repository.description }}
