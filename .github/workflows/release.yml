name: bloop-relay-release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-relay-release-assets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VERSION="${GITHUB_EVENT_RELEASE_TAG_NAME}"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build native relay binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          BUILD_DATE: ${{ steps.meta.outputs.date }}
        shell: bash
        run: |
          set -euo pipefail
          PKG="bloop-relay-${VERSION}-${GOOS}-${GOARCH}"
          STAGE="dist/${PKG}"
          mkdir -p "$STAGE"

          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          LDFLAGS="-s -w -X bloop-relay/pkg/version.Version=${VERSION} -X bloop-relay/pkg/version.Commit=${COMMIT} -X bloop-relay/pkg/version.Date=${BUILD_DATE}"

          go build -trimpath -ldflags="$LDFLAGS" -o "$STAGE/bloop-relay${EXT}" ./cmd/bloop-relay

          cp README.md "$STAGE/README.md"
          cp docs/VPS_DEPLOYMENT.md "$STAGE/VPS_DEPLOYMENT.md"
          mkdir -p "$STAGE/deploy/examples"
          cp deploy/examples/relay.example.yaml "$STAGE/deploy/examples/relay.example.yaml"

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist && zip -r "${PKG}.zip" "${PKG}")
          else
            tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip

  publish-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Lowercase repo owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAG="${GITHUB_EVENT_RELEASE_TAG_NAME}"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Build and push public bloop-relay image
        run: |
          docker buildx build \
            --push \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ steps.owner.outputs.value }}/bloop-relay:${{ steps.tag.outputs.value }} \
            -t ghcr.io/${{ steps.owner.outputs.value }}/bloop-relay:latest \
            -t docker.io/${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/bloop-relay:${{ steps.tag.outputs.value }} \
            -t docker.io/${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/bloop-relay:latest \
            -f deploy/docker/relay.Dockerfile .
