name: bloop-tunnel-release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-release-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build release binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags="-s -w" -o "dist/bloop-relay-${GOOS}-${GOARCH}${EXT}" ./cmd/bloop-client
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push public bloop-relay image
        run: |
          docker buildx build \
            --push \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ steps.owner.outputs.value }}/bloop-relay:${{ github.ref_name }} \
            -t ghcr.io/${{ steps.owner.outputs.value }}/bloop-relay:latest \
            -t docker.io/${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/bloop-relay:${{ github.ref_name }} \
            -t docker.io/${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/bloop-relay:latest \
            -f deploy/docker/client.Dockerfile .
