name: bloop-tunnel-ci

on:
  push:
    branches: [ main, master, rook/** ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run tests
        run: go test ./...

  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build bloop-client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          EXT=""
          if [ "${GOOS}" = "windows" ]; then EXT=".exe"; fi
          go build -o "dist/bloop-client-${GOOS}-${GOARCH}${EXT}" ./cmd/bloop-client
      - name: Build bloop-relay
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          EXT=""
          if [ "${GOOS}" = "windows" ]; then EXT=".exe"; fi
          go build -o "dist/bloop-relay-${GOOS}-${GOARCH}${EXT}" ./cmd/bloop-relay
      - uses: actions/upload-artifact@v4
        with:
          name: bloop-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build relay image
        run: docker build -f deploy/docker/relay.Dockerfile .
      - name: Build client image
        run: docker build -f deploy/docker/client.Dockerfile .
